<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="easymde.min.css">
</head>
<body>
  <div id="dannyis-sidebar">
    <div class="header">
      <h3>Create Note</h3>
      <!-- The close button is no longer needed as the side panel is controlled by the browser -->
    </div>
    <div class="content">
      <p><strong>Save to:</strong>
        <select id="notes-dir">
          <option value="/Users/danny/dev/dannyis-astro/src/content/notes">dannyis-astro</option>
          <option value="/Users/danny/dev/dannyis-astro-content/src/content/notes">dannyis-astro-content</option>
        </select>
      </p>
      <p><strong>Title:</strong> <input type="text" id="page-title" value="Loading..." /></p>
      <textarea id="markdown-editor"></textarea>
      <div class="button-group">
        <button id="add-highlight-btn">Add Highlight</button>
        <button id="save-note-btn">Save Note</button>
      </div>
      <div id="save-status" class="save-status" hidden>
        <span id="save-status-text"></span>
        <div class="save-status-actions">
          <button id="open-editor-btn" type="button">Open in editor</button>
          <button id="copy-path-btn" type="button">Copy path</button>
        </div>
      </div>
    </div>
  </div>
  <script src="easymde.min.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
